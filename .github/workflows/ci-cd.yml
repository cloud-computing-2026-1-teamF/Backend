name: Backend CI/CD

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  JAVA_VERSION: "25"
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-2' }}
  ECS_CLUSTER_NAME: ${{ vars.ECS_CLUSTER_NAME || 'sanggwonai-dev-cluster' }}
  APP_ECR_REPOSITORY: ${{ vars.APP_ECR_REPOSITORY || 'sanggwonai-dev-app' }}
  APP_ECS_SERVICE_NAME: ${{ vars.APP_ECS_SERVICE_NAME || 'app' }}

jobs:
  build:
    name: Test and package
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: sanggwon_ai
          POSTGRES_USER: sanggwon
          POSTGRES_PASSWORD: sanggwon
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sanggwon -d sanggwon_ai"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DB_URL: jdbc:postgresql://localhost:5432/sanggwon_ai
      TEST_DB_USERNAME: sanggwon
      TEST_DB_PASSWORD: sanggwon

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Run tests and build jar
        run: ./gradlew test bootJar --no-daemon

      - name: Build Docker image
        run: docker build --pull --platform linux/amd64 -t backend-ci:${{ github.sha }} .

  deploy:
    name: Push image and deploy ECS
    runs-on: ubuntu-latest
    needs: build
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push service image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          # ECS Fargate 1.4.0ъ░А OCI image index(manifest list) resolve ьЛЬ ъ░АыБФ not-found race ы░ЬьГЭ.
          # provenance/sbom attestationьЭД ыБДый┤ single-platform manifestыбЬ эС╕ьЛЬыРШьЦ┤ ьХИьаД.
          provenance: false
          sbom: false
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.APP_ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/${{ env.APP_ECR_REPOSITORY }}:latest

      - name: Force ECS deployment
        run: |
          set -euo pipefail

          aws ecs update-service \
            --cluster "${ECS_CLUSTER_NAME}" \
            --service "${APP_ECS_SERVICE_NAME}" \
            --force-new-deployment

          aws ecs wait services-stable \
            --cluster "${ECS_CLUSTER_NAME}" \
            --services "${APP_ECS_SERVICE_NAME}"
