name: Backend CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  # ECS has one mutable service; overlapping main pushes can fight the same rollout.
  group: backend-ci-cd-${{ github.repository }}
  cancel-in-progress: false

env:
  JAVA_VERSION: "25"
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-2' }}
  ECS_CLUSTER_NAME: ${{ vars.ECS_CLUSTER_NAME || 'sanggwonai-dev-cluster' }}
  APP_ECR_REPOSITORY: ${{ vars.APP_ECR_REPOSITORY || 'sanggwonai-dev-app' }}
  APP_ECS_SERVICE_NAME: ${{ vars.APP_ECS_SERVICE_NAME || 'app' }}

jobs:
  build:
    name: Test and package
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: sanggwon_ai
          POSTGRES_USER: sanggwon
          POSTGRES_PASSWORD: sanggwon
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sanggwon -d sanggwon_ai"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DB_URL: jdbc:postgresql://localhost:5432/sanggwon_ai
      TEST_DB_USERNAME: sanggwon
      TEST_DB_PASSWORD: sanggwon

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Run tests and build jar
        run: ./gradlew test bootJar --no-daemon

  deploy:
    name: Push image and deploy ECS
    runs-on: ubuntu-latest
    needs: build
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push service image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          # ECS Fargate 1.4.0가 OCI image index(manifest list) resolve 시 가끔 not-found race 발생.
          # provenance/sbom attestation을 끄면 single-platform manifest로 푸시되어 안전.
          provenance: false
          sbom: false
          cache-from: type=gha,scope=backend-service-image
          cache-to: type=gha,mode=max,scope=backend-service-image
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.APP_ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/${{ env.APP_ECR_REPOSITORY }}:latest

      - name: Read current ECS task definition
        run: |
          set -euo pipefail

          TASK_DEFINITION_ARN="$(aws ecs describe-services \
            --cluster "${ECS_CLUSTER_NAME}" \
            --services "${APP_ECS_SERVICE_NAME}" \
            --query 'services[0].taskDefinition' \
            --output text)"

          aws ecs describe-task-definition \
            --task-definition "${TASK_DEFINITION_ARN}" \
            --query 'taskDefinition' \
            > task-definition.json

      - name: Register ECS task definition revision
        env:
          IMAGE_URI: ${{ steps.ecr.outputs.registry }}/${{ env.APP_ECR_REPOSITORY }}:${{ github.sha }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_VACANCY_PROMPT_ENABLED: ${{ vars.OPENAI_VACANCY_PROMPT_ENABLED || 'true' }}
          OPENAI_VACANCY_PROMPT_MODEL: ${{ vars.OPENAI_VACANCY_PROMPT_MODEL || 'gpt-5.4-nano' }}
          OPENAI_VACANCY_PROMPT_TIMEOUT_SECONDS: ${{ vars.OPENAI_VACANCY_PROMPT_TIMEOUT_SECONDS || '6' }}
          OPENAI_VACANCY_PROMPT_MAX_OUTPUT_TOKENS: ${{ vars.OPENAI_VACANCY_PROMPT_MAX_OUTPUT_TOKENS || '1200' }}
          OPENAI_REPORT_ENABLED: ${{ vars.OPENAI_REPORT_ENABLED || 'true' }}
          OPENAI_REPORT_MODEL: ${{ vars.OPENAI_REPORT_MODEL || 'gpt-5.4-nano' }}
          OPENAI_REPORT_TIMEOUT_SECONDS: ${{ vars.OPENAI_REPORT_TIMEOUT_SECONDS || '180' }}
          OPENAI_REPORT_MAX_OUTPUT_TOKENS: ${{ vars.OPENAI_REPORT_MAX_OUTPUT_TOKENS || '16000' }}
        run: |
          set -euo pipefail

          if [ -z "${OPENAI_API_KEY:-}" ]; then
            echo "OPENAI_API_KEY GitHub secret is required for ECS deployment." >&2
            exit 1
          fi

          jq \
            --arg container "${APP_ECS_SERVICE_NAME}" \
            --arg image "${IMAGE_URI}" \
            --arg openaiApiKey "${OPENAI_API_KEY}" \
            --arg openaiEnabled "${OPENAI_VACANCY_PROMPT_ENABLED}" \
            --arg openaiModel "${OPENAI_VACANCY_PROMPT_MODEL}" \
            --arg openaiTimeout "${OPENAI_VACANCY_PROMPT_TIMEOUT_SECONDS}" \
            --arg openaiMaxOutputTokens "${OPENAI_VACANCY_PROMPT_MAX_OUTPUT_TOKENS}" \
            --arg reportEnabled "${OPENAI_REPORT_ENABLED}" \
            --arg reportModel "${OPENAI_REPORT_MODEL}" \
            --arg reportTimeout "${OPENAI_REPORT_TIMEOUT_SECONDS}" \
            --arg reportMaxOutputTokens "${OPENAI_REPORT_MAX_OUTPUT_TOKENS}" \
            '
              del(
                .taskDefinitionArn,
                .revision,
                .status,
                .requiresAttributes,
                .compatibilities,
                .registeredAt,
                .registeredBy
              )
              | .containerDefinitions |= map(
                  if .name == $container then
                    .image = $image
                    | .environment = (
                        ((.environment // []) | map(select(
                          .name != "OPENAI_API_KEY"
                          and .name != "OPENAI_VACANCY_PROMPT_ENABLED"
                          and .name != "OPENAI_VACANCY_PROMPT_MODEL"
                          and .name != "OPENAI_VACANCY_PROMPT_TIMEOUT_SECONDS"
                          and .name != "OPENAI_VACANCY_PROMPT_MAX_OUTPUT_TOKENS"
                          and .name != "OPENAI_REPORT_ENABLED"
                          and .name != "OPENAI_REPORT_MODEL"
                          and .name != "OPENAI_REPORT_TIMEOUT_SECONDS"
                          and .name != "OPENAI_REPORT_MAX_OUTPUT_TOKENS"
                        )))
                        + [
                          { "name": "OPENAI_API_KEY", "value": $openaiApiKey },
                          { "name": "OPENAI_VACANCY_PROMPT_ENABLED", "value": $openaiEnabled },
                          { "name": "OPENAI_VACANCY_PROMPT_MODEL", "value": $openaiModel },
                          { "name": "OPENAI_VACANCY_PROMPT_TIMEOUT_SECONDS", "value": $openaiTimeout },
                          { "name": "OPENAI_VACANCY_PROMPT_MAX_OUTPUT_TOKENS", "value": $openaiMaxOutputTokens },
                          { "name": "OPENAI_REPORT_ENABLED", "value": $reportEnabled },
                          { "name": "OPENAI_REPORT_MODEL", "value": $reportModel },
                          { "name": "OPENAI_REPORT_TIMEOUT_SECONDS", "value": $reportTimeout },
                          { "name": "OPENAI_REPORT_MAX_OUTPUT_TOKENS", "value": $reportMaxOutputTokens }
                        ]
                      )
                  else
                    .
                  end
                )
            ' task-definition.json > task-definition-updated.json

          NEW_TASK_DEFINITION_ARN="$(aws ecs register-task-definition \
            --cli-input-json file://task-definition-updated.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)"

          echo "NEW_TASK_DEFINITION_ARN=${NEW_TASK_DEFINITION_ARN}" >> "${GITHUB_ENV}"

      - name: Deploy ECS task definition
        run: |
          set -euo pipefail

          aws ecs update-service \
            --cluster "${ECS_CLUSTER_NAME}" \
            --service "${APP_ECS_SERVICE_NAME}" \
            --task-definition "${NEW_TASK_DEFINITION_ARN}" \
            --force-new-deployment

          # `aws ecs wait services-stable` 은 40회×15초=10분이 하드캡이라,
          # healthCheckGracePeriod(30분) + 대용량 데이터셋/Liquibase 부팅 지연 때
          # 배포가 실제로 성공해도 false-fail 한다. PRIMARY 배포의 rolloutState 를
          # 직접 폴링해 COMPLETED/FAILED 로 정확히 판정한다 (최대 30분).
          echo "Polling PRIMARY deployment rolloutState (timeout 30m)..."
          DEADLINE=$(( SECONDS + 1800 ))
          while true; do
            STATE="$(aws ecs describe-services \
              --cluster "${ECS_CLUSTER_NAME}" \
              --services "${APP_ECS_SERVICE_NAME}" \
              --query "services[0].deployments[?status=='PRIMARY']|[0].rolloutState" \
              --output text 2>/dev/null || echo IN_PROGRESS)"
            echo "rolloutState=${STATE} (elapsed ${SECONDS}s)"
            case "${STATE}" in
              COMPLETED)
                echo "ECS rollout completed."
                break
                ;;
              FAILED)
                echo "ECS rollout FAILED — circuit breaker rolled back to previous task def." >&2
                exit 1
                ;;
            esac
            if [ "${SECONDS}" -ge "${DEADLINE}" ]; then
              echo "Timed out after 30m waiting for rollout to stabilize." >&2
              exit 1
            fi
            sleep 15
          done
