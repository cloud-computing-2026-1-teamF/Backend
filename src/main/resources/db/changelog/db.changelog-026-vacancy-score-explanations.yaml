databaseChangeLog:
  - changeSet:
      id: 051-create-vacancy-category-score-explanations
      author: codex
      changes:
        - sql:
            dbms: postgresql
            splitStatements: true
            stripComments: true
            sql: |
              create table if not exists vacancy_category_score_explanations (
                property_id              varchar(40) not null,
                category_id              varchar(40) not null,
                contribution_direction   varchar(16) not null,
                contribution_rank        smallint not null,
                feature_key              varchar(80) not null,
                feature_label            varchar(120) not null,
                feature_display_value    varchar(160),
                impact_value             numeric(12,6) not null,
                impact_percent           numeric(6,2) not null,
                source                   varchar(80) not null default 'model_explanation',
                created_at               timestamp with time zone not null default now(),
                primary key (
                  property_id,
                  category_id,
                  contribution_direction,
                  contribution_rank
                ),
                constraint ck_vacancy_category_score_explanations_direction
                  check (contribution_direction in ('positive', 'negative')),
                constraint ck_vacancy_category_score_explanations_rank
                  check (contribution_rank between 1 and 3),
                constraint fk_vacancy_category_score_explanations_score
                  foreign key (property_id, category_id)
                  references vacancy_category_scores(property_id, category_id)
                  on delete cascade
              );

              create index if not exists idx_vacancy_score_explanations_lookup
                on vacancy_category_score_explanations (property_id, category_id);

              create index if not exists idx_vacancy_score_explanations_source
                on vacancy_category_score_explanations (source);

  - changeSet:
      id: 052-load-mock-vacancy-category-score-explanations
      author: codex
      changes:
        - sqlFile:
            dbms: postgresql
            path: db/scripts/insert_mock_vacancy_score_explanations.sql
            relativeToChangelogFile: false
            splitStatements: true
            stripComments: true
