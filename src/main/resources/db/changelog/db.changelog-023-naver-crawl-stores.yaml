databaseChangeLog:
  - changeSet:
      id: 043-create-naver-crawl-stores
      author: minseo
      changes:
        - sql:
            dbms: postgresql
            splitStatements: true
            stripComments: true
            sql: |
              -- 네이버 지도 격자 스윕 크롤러(Implementation-of-PDF-Report-Generation) 결과 적재용.
              -- 크롤러 SQLite(db.py: stores / store_tags)를 RDS(PostgreSQL)로 옮긴 스키마.
              --   crawl_naver_stores      : 수집된 가게 기본정보 + 좌표 + 리뷰 통계 합계
              --   crawl_naver_store_tags  : 가게별 방문자 키워드 태그 + 횟수 (가게 1 : 태그 N)
              -- 적재 경로: crawl_district.py / tag_fetch_scrapling.py -> export_competitors.py.
              create table if not exists crawl_naver_stores (
                id              bigint generated by default as identity primary key,
                naver_place_id  varchar(40) not null,
                name            varchar(200),
                category        varchar(200),
                address         varchar(300),
                lat             double precision,
                lng             double precision,
                review_count    integer,
                voted_total     integer,
                voter_count     integer,
                scraped_at      timestamp with time zone,
                created_at      timestamp with time zone not null default now(),
                constraint uq_crawl_naver_stores_place unique (naver_place_id)
              );

              create index if not exists idx_crawl_naver_stores_place
                on crawl_naver_stores (naver_place_id);
              create index if not exists idx_crawl_naver_stores_geo
                on crawl_naver_stores (lat, lng);

              create table if not exists crawl_naver_store_tags (
                id        bigint generated by default as identity primary key,
                store_id  bigint not null,
                tag       varchar(200) not null,
                count     integer not null default 0,
                rank      integer,
                constraint uq_crawl_naver_store_tags unique (store_id, tag),
                constraint fk_crawl_naver_store_tags_store
                  foreign key (store_id) references crawl_naver_stores (id) on delete cascade
              );

              create index if not exists idx_crawl_naver_store_tags_store
                on crawl_naver_store_tags (store_id);
