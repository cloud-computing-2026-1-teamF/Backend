      author: codex
      validCheckSum: 9:df88c2eae92b220a6bf2ede4f6b54561
      changes:
        - sql:
            dbms: postgresql
            sql: |
              delete from analysis_vacancy_recommendations;
              delete from analyses;
              alter table if exists analysis_vacancy_recommendations drop constraint if exists fk_analysis_recommendations_vacancy;
              alter table if exists analyses drop constraint if exists fk_analyses_vacancy;
              alter table if exists analyses drop constraint if exists fk_analyses_business_type;
              drop table if exists vacancy_category_scores cascade;
              drop table if exists vacancy_category_spatial cascade;
              drop table if exists vacancy_common_features cascade;
              drop table if exists categories cascade;
              drop table if exists vacancies cascade;
        - createTable:
            tableName: categories
            columns:
              - column:
                  name: category_id
                  type: "varchar(40)"
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: 카테고리명
                  type: "varchar(100)"
        - createTable:
