              - column: { name: 업종성장률_250m, type: NUMERIC }
              - column: { name: 업종성장률_500m, type: NUMERIC }
              - column: { name: 업종성장률_1000m, type: NUMERIC }
        # Score data is loaded separately by scripts/load_ai_horizon_scores.py.
        # Keep Liquibase responsible for schema/reference data only; the loader
        # writes 3-year scores into vacancy_category_scores and 1/3/5-year
        # rows into vacancy_category_horizon_scores from the AI export.

  - changeSet:
      id: 032-index-and-link-processed-vacancy-data
      author: codex
      changes:
        - addForeignKeyConstraint:
            baseTableName: vacancy_common_features
            baseColumnNames: property_id
            referencedTableName: vacancies
            referencedColumnNames: property_id
            constraintName: fk_vacancy_common_features_property
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: vacancy_category_spatial
            baseColumnNames: property_id
            referencedTableName: vacancies
            referencedColumnNames: property_id
            constraintName: fk_vacancy_category_spatial_property
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: vacancy_category_spatial
            baseColumnNames: category_id
            referencedTableName: categories
            referencedColumnNames: category_id
            constraintName: fk_vacancy_category_spatial_category
        - addForeignKeyConstraint:
            baseTableName: vacancy_category_scores
            baseColumnNames: property_id
            referencedTableName: vacancies
            referencedColumnNames: property_id
            constraintName: fk_vacancy_category_scores_property
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: vacancy_category_scores
            baseColumnNames: category_id
            referencedTableName: categories
            referencedColumnNames: category_id
            constraintName: fk_vacancy_category_scores_category
        - addForeignKeyConstraint:
            baseTableName: analyses
            baseColumnNames: business_type_key
            referencedTableName: categories
            referencedColumnNames: category_id
            constraintName: fk_analyses_category
        - addForeignKeyConstraint:
            baseTableName: analyses
            baseColumnNames: vacancy_id
            referencedTableName: vacancies
            referencedColumnNames: property_id
            constraintName: fk_analyses_vacancy
        - addForeignKeyConstraint:
            baseTableName: analysis_vacancy_recommendations
            baseColumnNames: vacancy_id
            referencedTableName: vacancies
            referencedColumnNames: property_id
            constraintName: fk_analysis_recommendations_vacancy
        - createIndex:
            tableName: vacancies
            indexName: idx_vacancies_location
            columns:
              - column: { name: 위도 }
              - column: { name: 경도 }
        - createIndex:
            tableName: vacancies
            indexName: idx_vacancies_rent_filter
            columns:
              - column: { name: 월세_만원 }
              - column: { name: 보증금_만원 }
              - column: { name: 관리비_만원 }
        - createIndex:
            tableName: vacancy_common_features
            indexName: idx_vacancy_common_area_code
            columns:
              - column: { name: 행정동_행정동_코드 }
        - createIndex:
            tableName: vacancy_category_scores
            indexName: idx_vacancy_scores_category_score
            columns:
              - column: { name: category_id }
              - column: { name: 생존점수 }
        - sql:
            dbms: postgresql
            sql: |
              insert into areas (id, name, region, full_name, center_lat, center_lng)
              select
                cf.행정동_행정동_코드,
                regexp_replace(cf.행정동_행정동_명, '^.* ', ''),
                regexp_replace(cf.행정동_행정동_명, ' [^ ]+$', ''),
                cf.행정동_행정동_명,
                avg(v.위도)::decimal(9,6),
                avg(v.경도)::decimal(9,6)
              from vacancy_common_features cf
              join vacancies v on v.property_id = cf.property_id
              where cf.행정동_행정동_코드 is not null
                and cf.행정동_행정동_명 is not null
                and v.위도 is not null
                and v.경도 is not null
              group by cf.행정동_행정동_코드, cf.행정동_행정동_명
              on conflict (id) do update set
                name = excluded.name,
                region = excluded.region,
                full_name = excluded.full_name,
                center_lat = excluded.center_lat,
                center_lng = excluded.center_lng;
