databaseChangeLog:
  - changeSet:
      id: 048-create-vacancy-category-horizon-scores
      author: codex
      changes:
        - sql:
            dbms: postgresql
            splitStatements: true
            stripComments: true
            sql: |
              create table if not exists vacancy_category_horizon_scores (
                property_id     varchar(40) not null,
                category_id     varchar(40) not null,
                horizon_years   integer not null,
                survival_score  numeric(8,6) not null,
                recommended     smallint not null,
                source          varchar(80) not null default 'ai-horizon-model',
                created_at      timestamp with time zone not null default now(),
                primary key (property_id, category_id, horizon_years),
                constraint fk_vacancy_category_horizon_scores_property
                  foreign key (property_id) references vacancies(property_id) on delete cascade,
                constraint fk_vacancy_category_horizon_scores_category
                  foreign key (category_id) references categories(category_id)
              );

              create index if not exists idx_vacancy_category_horizon_scores_lookup
                on vacancy_category_horizon_scores (property_id, category_id, horizon_years);

              create index if not exists idx_vacancy_category_horizon_scores_rank
                on vacancy_category_horizon_scores (horizon_years, category_id, survival_score desc);

  # Horizon score data comes from the AI backend horizon export CSVs, not from
  # annual score history. Keep Liquibase responsible for schema only so ECS
  # startup never streams the large score datasets during application boot.
