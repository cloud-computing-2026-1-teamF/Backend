              variants (
                variant_no,
                score_delta,
                rent_delta,
                deposit_delta,
                fee_delta,
                lat_delta,
                lng_delta,
                area_delta,
                category,
                label_suffix,
                multi_use
              ) as (
                values
                  (1, 5.80, 45, 900, 5, 0.000650, -0.000520, 12.40, 'restaurant', 'A', true),
                  (2, 0.00, 0, 0, 0, -0.000840, 0.000760, 0.00, 'cafe', 'B', false),
                  (3, -7.30, -55, -700, -4, 0.001160, 0.001080, -8.60, 'bakery', 'C', false)
              )
              insert into vacancies (
                id,
                area_id,
                monthly_rent,
                deposit,
                maintenance_fee,
                latitude,
                longitude,
                survival_score,
                floating_population_annual_total,
                resident_population_annual_total,
                worker_population_annual_total,
                floating_population_quarterly_average,
                resident_population_quarterly_average,
                worker_population_quarterly_average,
                restaurant_count_250m,
                cafe_count_250m,
                industry_growth_rate_250m,
                restaurant_count_500m,
                cafe_count_500m,
                industry_growth_rate_500m,
                restaurant_count_1000m,
                cafe_count_1000m,
                industry_growth_rate_1000m,
                category,
                business_middle_category_name,
                business_sub_category_name,
                multi_use_facility,
                facility_total_size,
                location_area,
                evening_population_ratio,
                late_night_population_ratio,
                morning_population_ratio,
                weekend_population_ratio,
                age_20_30_population_ratio,
                age_40_plus_population_ratio,
                female_population_ratio,
                resident_to_floating_ratio,
                worker_to_floating_ratio,
                official_land_price,
                closure_rate,
                opening_rate,
                average_sales_per_store,
                time_based_sales_ratio,
                created_at,
                updated_at
              )
              select
                concat('vac_seoul_', a.area_id, '_', v.variant_no),
                a.area_id,
                greatest(80, a.base_rent + v.rent_delta),
                greatest(500, a.base_deposit + v.deposit_delta),
                greatest(3, a.base_fee + v.fee_delta),
                a.lat + v.lat_delta,
                a.lng + v.lng_delta,
                greatest(50.00, least(98.50, a.base_score + v.score_delta)),
                (a.base_foot + (v.variant_no * 145000))::bigint,
                (42000 + (v.variant_no * 3700) + (a.base_score * 35))::bigint,
                (65000 + (v.variant_no * 9800) + (a.base_rent * 120))::bigint,
                ((a.base_foot + (v.variant_no * 145000)) / 4.0)::decimal(18,2),
                ((42000 + (v.variant_no * 3700) + (a.base_score * 35)) / 4.0)::decimal(18,2),
                ((65000 + (v.variant_no * 9800) + (a.base_rent * 120)) / 4.0)::decimal(18,2),
                greatest(1, a.base_restaurants / 3 + v.variant_no),
                greatest(1, a.base_cafes / 3 + (4 - v.variant_no)),
                greatest(1.0, a.base_growth + v.score_delta / 6.0)::decimal(10,4),
                greatest(1, a.base_restaurants + (v.variant_no * 4)),
                greatest(1, a.base_cafes + (v.variant_no * 3)),
                greatest(1.0, a.base_growth + v.score_delta / 4.0)::decimal(10,4),
                greatest(1, a.base_restaurants * 3 + (v.variant_no * 9)),
                greatest(1, a.base_cafes * 3 + (v.variant_no * 7)),
                greatest(1.0, a.base_growth + v.score_delta / 5.0)::decimal(10,4),
                'food_service',
                v.category,
                concat(a.area_name, ' 테스트 공실 ', v.label_suffix),
                v.multi_use,
                greatest(16.00, 34.50 + v.area_delta + (a.base_rent / 35.0))::decimal(14,2),
                greatest(12.00, 26.00 + v.area_delta + (a.base_rent / 45.0))::decimal(14,2),
                greatest(12.0, 25.0 + v.variant_no * 3.4 + (a.base_score - 70.0) / 3.0)::decimal(10,4),
                greatest(3.0, 7.0 + v.variant_no * 4.2 + (a.base_growth / 2.0))::decimal(10,4),
                greatest(5.0, 21.0 - v.variant_no * 3.1 + (90.0 - a.base_score) / 6.0)::decimal(10,4),
                greatest(10.0, 26.0 + v.variant_no * 3.0 + (a.base_growth / 2.0))::decimal(10,4),
                greatest(12.0, 35.0 + v.variant_no * 5.2 + (a.base_score - 70.0) / 2.0)::decimal(10,4),
                greatest(10.0, 42.0 - v.variant_no * 2.1 + (88.0 - a.base_score) / 4.0)::decimal(10,4),
                greatest(30.0, 48.0 + v.variant_no * 2.2)::decimal(10,4),
                greatest(0.05, 0.18 + (v.variant_no * 0.025) - (a.base_score - 80.0) / 1000.0)::decimal(10,4),
                greatest(0.08, 0.26 + (v.variant_no * 0.035) + (a.base_rent / 5000.0))::decimal(10,4),
                (8500000 + a.base_rent * 22500 + v.deposit_delta * 650)::decimal(18,2),
                greatest(3.00, 10.50 - (a.base_score - 70.0) / 5.0 + v.variant_no * 0.45)::decimal(10,4),
                greatest(3.00, 5.20 + (a.base_growth / 2.0) + v.variant_no * 0.70)::decimal(10,4),
                greatest(500.00, a.base_sales + v.rent_delta * 4.5 + v.variant_no * 120.0)::decimal(18,2),
                greatest(8.00, 17.00 + v.variant_no * 4.4 + (a.base_growth / 1.5))::decimal(10,4),
                current_timestamp,
                current_timestamp
              from area_seed a
              cross join variants v
              on conflict (id) do nothing;

