databaseChangeLog:
  # 크롤 결과(홍대 네이버 리뷰 태그)를 CSV로 적재. (방법 B: RDS 직접 접근 불필요)
  # 크롤 -> export_crawl_csv.py 로 아래 두 CSV 생성 -> 커밋/푸시 -> 배포 시 Liquibase 가 적재.
  # 빈 헤더 CSV면 0행 적재(배포 안전). 데이터 채워 커밋하면 runOnChange 로 다음 배포에 반영.
  # FK(store_tags.store_id -> stores.id) 때문에 stores 를 먼저 적재한다.
  # id 는 SQLite 의 store id 를 그대로 explicit 으로 넣는다(crawl_naver_stores.id 는
  # generated BY DEFAULT as identity 라 explicit 값 허용 — tags 가 이 id 를 참조).
  # id 변경(045->047): runOnChange 체크섬이 외부 CSV 변경을 못 잡아 재적재가 스킵되던
  # 문제 회피용. 새 id 라 배포 시 무조건 1회 재실행되어 현재 CSV 전체를 강제 upsert 한다.
  - changeSet:
      id: 047-reload-crawl-naver-stores
      author: minseo
      runOnChange: true
      changes:
        - loadUpdateData:
            tableName: crawl_naver_stores
            file: db/data/crawl/crawl_naver_stores.csv
            primaryKey: "id"
            columns:
              - column: { name: id, type: NUMERIC }
              - column: { name: naver_place_id, type: STRING }
              - column: { name: name, type: STRING }
              - column: { name: category, type: STRING }
              - column: { name: address, type: STRING }
              - column: { name: lat, type: NUMERIC }
              - column: { name: lng, type: NUMERIC }
              - column: { name: review_count, type: NUMERIC }
              - column: { name: voted_total, type: NUMERIC }
              - column: { name: voter_count, type: NUMERIC }
  - changeSet:
      id: 048-reload-crawl-naver-store-tags
      author: minseo
      runOnChange: true
      changes:
        - loadUpdateData:
            tableName: crawl_naver_store_tags
            file: db/data/crawl/crawl_naver_store_tags.csv
            primaryKey: "store_id,tag"
            columns:
              - column: { name: store_id, type: NUMERIC }
              - column: { name: tag, type: STRING }
              - column: { name: count, type: NUMERIC }
              - column: { name: rank, type: NUMERIC }
