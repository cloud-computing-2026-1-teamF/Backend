spring:
  application:
    name: sanggwon-ai-backend
  config:
    import: optional:file:./application-local.yml
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/sanggwon_ai}
    username: ${DB_USERNAME:sanggwon}
    password: ${DB_PASSWORD:sanggwon}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  jackson:
    property-naming-strategy: SNAKE_CASE

server:
  shutdown: graceful

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] traceId=%X{traceId:-none} %logger{36} - %msg%n"

app:
  auth:
    jwt-secret: ${APP_JWT_SECRET:replace-this-with-a-long-secret-for-prod}
    access-token-expiry-seconds: 900
    refresh-token-expiry-days: 30
    kakao-client-id: ${KAKAO_CLIENT_ID:replace-this-with-your-kakao-client-id}
    kakao-client-secret: ${KAKAO_CLIENT_SECRET:}
    kakao-redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:5174/auth/kakao/callback}
    naver-client-id: ${NAVER_CLIENT_ID:replace-this-with-your-naver-client-id}
    naver-client-secret: ${NAVER_CLIENT_SECRET:replace-this-with-your-naver-client-secret}
    naver-redirect-uri: ${NAVER_REDIRECT_URI:http://localhost:5174/auth/naver/callback}

  analysis:
    estimated-seconds: 4

  vacancy:
    prompt:
      openai:
        enabled: ${OPENAI_VACANCY_PROMPT_ENABLED:false}
        api-key: ${OPENAI_API_KEY:}
        endpoint: ${OPENAI_RESPONSES_ENDPOINT:https://api.openai.com/v1/responses}
        model: ${OPENAI_VACANCY_PROMPT_MODEL:gpt-5.4-nano}
        timeout-seconds: ${OPENAI_VACANCY_PROMPT_TIMEOUT_SECONDS:15}
        max-output-tokens: ${OPENAI_VACANCY_PROMPT_MAX_OUTPUT_TOKENS:1200}

  report:
    openai:
      enabled: ${OPENAI_REPORT_ENABLED:false}
      api-key: ${OPENAI_API_KEY:}
      endpoint: ${OPENAI_RESPONSES_ENDPOINT:https://api.openai.com/v1/responses}
      model: ${OPENAI_REPORT_MODEL:gpt-5.4-nano}
      # 보고서 JSON(필수 챕터 10개)은 ~12.5k 토큰·~85초 소요. 9000/60초로는 잘림·타임아웃 -> 503.
      timeout-seconds: ${OPENAI_REPORT_TIMEOUT_SECONDS:180}
      max-output-tokens: ${OPENAI_REPORT_MAX_OUTPUT_TOKENS:16000}

springdoc:
  swagger-ui:
    operations-sorter: alpha
    tags-sorter: alpha
