spring:
  datasource:
    url: ${TEST_DB_URL:jdbc:postgresql://localhost:5433/sanggwon_ai}
    username: ${TEST_DB_USERNAME:sanggwon}
    password: ${TEST_DB_PASSWORD:sanggwon}
  jpa:
    hibernate:
      ddl-auto: validate
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  jackson:
    property-naming-strategy: SNAKE_CASE

app:
  auth:
    jwt-secret: test-secret-key-that-is-long-enough-for-tests
    access-token-expiry-seconds: 900
    refresh-token-expiry-days: 30
  analysis:
    estimated-seconds: 4
