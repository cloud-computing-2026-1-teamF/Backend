name: sanggwon-cloud-backend

services:
  postgres:
    image: postgres:17
    container_name: sanggwon-postgres
    environment:
      POSTGRES_DB: sanggwon_ai
      POSTGRES_USER: sanggwon
      POSTGRES_PASSWORD: sanggwon
    ports:
      - "${SANGGWON_POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sanggwon-api
    depends_on:
      - postgres
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/sanggwon_ai
      DB_USERNAME: sanggwon
      DB_PASSWORD: sanggwon
      APP_JWT_SECRET: change-this-for-production
    ports:
      - "${SANGGWON_API_PORT:-8081}:8080"

volumes:
  postgres-data:
    name: sanggwon-cloud-backend-postgres-data
